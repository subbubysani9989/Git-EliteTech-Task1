name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute automated application tests
        run: npm test

  deploy-to-production:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages hosting configuration
        uses: actions/configure-pages@v4

      - name: Bundle web assets for upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy assets to GitHub Pages cloud hosting
        id: deployment
        uses: actions/deploy-pages@v4

